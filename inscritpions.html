<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - StudentMarket Global</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --primary: #00d4ff;
  --secondary: #00ff88;
  --dark: #0a0f1f;
  --white: #ffffff;
  --glass: rgba(255,255,255,0.9);
  --glass-border: rgba(0,0,0,0.1);
  --shadow: 0 20px 40px rgba(0,0,0,0.1);
}

body {
  font-family: 'Roboto', sans-serif;
  background: var(--white);
  margin: 0;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  padding: 15px 5%;
  background: rgba(255,255,255,0.95);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Montserrat';
  font-weight: bold;
  font-size: 1.5rem;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: var(--dark);
}

/* FORM */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding-top: 100px;
}

.form-box {
  background: var(--glass);
  padding: 40px;
  border-radius: 20px;
  box-shadow: var(--shadow);
  width: 400px;
}

.form-box h1 {
  text-align: center;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
}

.form-input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.9;
}

.link {
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">StudentMarket</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="container">
  <div class="form-box">
    <h1>Créer un compte</h1>

    <form id="registerForm">

      <div class="form-group">
        <label>Nom</label>
        <input type="text" class="form-input" id="nom" required>
      </div>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" class="form-input" id="prenom" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-input" id="email" required>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" class="form-input" id="password" required>
      </div>

      <div class="form-group">
        <label>Confirmer mot de passe</label>
        <input type="password" class="form-input" id="confirmPassword" required>
      </div>

      <button type="submit" class="btn">
        <i class="fas fa-user-plus"></i> S'inscrire
      </button>

    </form>

    <div class="link">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>

  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    alert("Les mots de passe ne correspondent pas");
    return;
  }

  alert("Compte créé avec succès !");
  window.location.href = "login.html";
});
</script>

</body>
</html>
